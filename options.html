<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Tab Search Plus</title>
  <link rel="icon" href="icons/tab-search-plus.svg">
  <style>
    :root {
      --primary-color: #0060df;
      --primary-hover: #003eaa;
      --bg-color: #f9f9fb;
      --card-bg: #ffffff;
      --text-color: #15141a;
      --text-secondary: #5b5b66;
      --border-color: #ced4da;
      --success-color: #008744;
      --error-color: #d70022;
      --recording-color: #0060df;
      --recording-bg: rgba(0, 96, 223, 0.06);
      --recording-border: #0060df;
      --badge-bg: #f0f0f4;
      --badge-border: #d0d0d7;
      --badge-shadow: rgba(0, 0, 0, 0.06);
      --btn-secondary-bg: #f0f0f4;
      --btn-secondary-hover: #e0e0e7;
      --code-bg: #eee;
      --success-bg: rgba(0, 135, 68, 0.07);
      --error-bg: rgba(215, 0, 34, 0.07);
      --card-shadow: rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --primary-color: #45a1ff;
        --primary-hover: #73b7ff;
        --bg-color: #1c1b22;
        --card-bg: #2b2a33;
        --text-color: #f9f9fb;
        --text-secondary: #b1b1b3;
        --border-color: #4a4a4f;
        --success-color: #30e060;
        --error-color: #ff6b6b;
        --recording-color: #45a1ff;
        --recording-bg: rgba(69, 161, 255, 0.1);
        --recording-border: #45a1ff;
        --badge-bg: #38373f;
        --badge-border: #56555e;
        --badge-shadow: rgba(0, 0, 0, 0.2);
        --btn-secondary-bg: #38373f;
        --btn-secondary-hover: #4a4a4f;
        --code-bg: #38373f;
        --success-bg: rgba(48, 224, 96, 0.1);
        --error-bg: rgba(255, 107, 107, 0.1);
        --card-shadow: rgba(0, 0, 0, 0.3);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      letter-spacing: 0;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 32px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 12px var(--card-shadow);
    }

    h1 {
      margin: 0 0 24px 0;
      color: var(--text-color);
      font-size: 24px;
      font-weight: 600;
    }

    .header-description {
      margin: -16px 0 24px 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .header-description code {
      padding: 2px 4px;
      background: var(--code-bg);
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
    }

    .setting-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
    }

    .shortcut-recorder-wrapper {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }

    .shortcut-input-container {
      position: relative;
      display: flex;
      flex: 1;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      transition: border-color .2s, box-shadow .2s;
    }

    .shortcut-input-container:focus-within {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(0, 96, 223, .15);
    }

    .shortcut-input-container.recording {
      border-color: var(--recording-border);
      background: var(--recording-bg);
      animation: pulse-border 1.5s ease-in-out infinite;
    }

    .shortcut-text-input {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 10px 70px 10px 12px;
      border: 0;
      border-radius: 8px;
      outline: 0;
      background: transparent;
      color: var(--text-color);
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 15px;
    }

    .shortcut-input-container.recording .shortcut-text-input {
      color: transparent;
      caret-color: transparent;
    }

    .shortcut-text-input:not(:focus).has-badges {
      color: transparent;
    }

    .shortcut-input-container:not(.recording) .shortcut-text-input:focus + .shortcut-display-layer {
      display: none;
    }

    .shortcut-display-layer {
      position: absolute;
      inset: 0 70px 0 0;
      z-index: 1;
      display: flex;
      align-items: center;
      padding-left: 12px;
      pointer-events: none;
    }

    .shortcut-inner-actions {
      position: absolute;
      top: 50%;
      right: 8px;
      z-index: 3;
      display: flex;
      gap: 4px;
      transform: translateY(-50%);
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .2s, color .2s;
    }

    .icon-btn:hover {
      background: var(--btn-secondary-bg);
      color: var(--text-color);
    }

    @keyframes pulse-border {
      0%,
      100% {
        box-shadow: 0 0 0 3px rgba(0, 96, 223, .15);
      }

      50% {
        box-shadow: 0 0 0 3px rgba(0, 96, 223, .3);
      }
    }

    .key-badge {
      display: inline-flex;
      align-items: center;
      margin-right: 4px;
      padding: 3px 8px;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      border-radius: 5px;
      box-shadow: 0 1px 1px var(--badge-shadow);
      color: var(--text-color);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
    }

    .key-separator {
      margin: 0 2px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .recording-label {
      color: var(--recording-color);
      font-family: Inter, sans-serif;
      font-size: 14px;
      font-weight: 500;
    }

    .btn {
      padding: 10px 16px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      transition: background-color .2s, transform .1s;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn-secondary {
      background-color: var(--btn-secondary-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background-color: var(--btn-secondary-hover);
    }

    .btn-record {
      min-width: 90px;
    }

    .btn-record.is-recording {
      background-color: var(--error-color);
      border-color: var(--error-color);
      color: #ffffff;
    }

    .settings-divider {
      margin: 28px 0;
      border: 0;
      border-top: 1px solid var(--border-color);
    }

    .shortcut-description {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.4;
    }

    .validation-msg {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
    }

    .validation-msg.show {
      display: block;
    }

    .validation-msg.error {
      background: var(--error-bg);
      color: var(--error-color);
    }

    #status {
      min-height: 20px;
      margin-top: 16px;
      padding: 0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      transition: all .3s;
    }

    #status.success {
      padding: 10px;
      background: var(--success-bg);
      color: var(--success-color);
    }

    #status.error {
      padding: 10px;
      background: var(--error-bg);
      color: var(--error-color);
    }

    @media (max-width: 540px) {
      body {
        padding: 20px 12px;
      }

      .container {
        padding: 24px;
      }

      .shortcut-recorder-wrapper {
        flex-direction: column;
      }

      .btn-record {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Extension Settings</h1>
    <p class="header-description">
      Requires a modifier plus a letter, number, or function key.<br>
      Default shortcut: <code>Cmd + Ctrl + A</code> on Mac, <code>Ctrl + Alt + A</code> elsewhere.
    </p>

    <div class="setting-group shortcut-item" data-command="_execute_browser_action">
      <label for="tab-search-shortcut">Open Tab Search</label>
      <div class="shortcut-recorder-wrapper">
        <div class="shortcut-input-container">
          <input id="tab-search-shortcut" name="tab-search-shortcut" type="text" class="shortcut-text-input" placeholder="Type a shortcut or record" spellcheck="false">
          <div class="shortcut-display-layer"></div>
          <div class="shortcut-inner-actions">
            <button class="icon-btn btn-reset" title="Reset to default" aria-label="Reset to default">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
            <button class="icon-btn btn-clear" title="Clear shortcut" aria-label="Clear shortcut">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
        </div>
        <button class="btn btn-secondary btn-record" type="button">Record</button>
      </div>
      <div class="validation-msg"></div>
      <p class="shortcut-description">
        This is Firefox's browser-action shortcut, so it opens the same popup as the toolbar button.
      </p>
    </div>

    <hr class="settings-divider">

    <button id="open-shortcut-settings" class="btn btn-secondary" type="button">Open Firefox Shortcut Manager</button>

    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
